- name: stop "{{ component }}" service
  ansible.builtin.service:
    name: "{{ catalogue }}"
    state: stopped

- name: remove the /app directory
  ansible.builtin.file:
    path: /app
    state: absent

- name: create /app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: download and unzip the new version code:
  ansible.builtin.unarchive:
    src: "https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-{{ app-version }}.zip"           
    dest: /app
    remote_src: yes

- name: install new dependencies:
  community.general.npm:
    path: /app

- name: restart catalogue service:
  ansible.builtin.service:
    name: catalogue
    state: restarted

    
            